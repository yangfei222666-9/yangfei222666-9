<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TaijiOS execution proof card</title>
  <desc id="desc">A proof card summarizing the first TaijiOS 60-day execution snapshot: 14 modules, 346 heartbeats, 12 out of 12 LLM gateway tests, 70,748 lines of code, and 2 live demos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#102B3F"/>
      <stop offset="1" stop-color="#06120D"/>
    </linearGradient>
    <linearGradient id="accent" x1="110" y1="94" x2="1090" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D1B2"/>
      <stop offset="0.5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#F7B955"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <path d="M80 92C184 45 297 59 410 94C518 127 617 171 739 138C858 106 963 48 1120 88" stroke="url(#accent)" stroke-width="3" opacity="0.65"/>
  <path d="M91 329C221 276 329 282 448 314C566 346 679 366 798 319C918 272 1014 245 1117 288" stroke="url(#accent)" stroke-width="2" opacity="0.38"/>
  <g filter="url(#shadow)">
    <rect x="70" y="66" width="1060" height="288" rx="28" fill="#0B1624" fill-opacity="0.82" stroke="#24435C"/>
  </g>
  <text x="110" y="128" fill="#E9F2FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="800">TaijiOS</text>
  <text x="110" y="171" fill="#8FB2C9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="500">First 60-day solo + multi-AI reliability-runtime snapshot</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(110 220)">
      <text y="0" fill="#00D1B2" font-size="36" font-weight="800">60</text>
      <text y="34" fill="#BFD5E6" font-size="17">day snapshot</text>
    </g>
    <g transform="translate(280 220)">
      <text y="0" fill="#58A6FF" font-size="36" font-weight="800">14</text>
      <text y="34" fill="#BFD5E6" font-size="17">modules live</text>
    </g>
    <g transform="translate(470 220)">
      <text y="0" fill="#F7B955" font-size="36" font-weight="800">346</text>
      <text y="34" fill="#BFD5E6" font-size="17">heartbeats</text>
    </g>
    <g transform="translate(680 220)">
      <text y="0" fill="#A8F0C6" font-size="36" font-weight="800">12/12</text>
      <text y="34" fill="#BFD5E6" font-size="17">LLM gateway tests</text>
    </g>
    <g transform="translate(930 220)">
      <text y="0" fill="#F1F5F9" font-size="36" font-weight="800">70,748</text>
      <text y="34" fill="#BFD5E6" font-size="17">LoC consolidated</text>
    </g>
  </g>
  <text x="110" y="312" fill="#A7C0D5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="500">Live demos: HUD + CyberPet · Signal over vanity metrics · Safety first, then automation</text>
</svg>
